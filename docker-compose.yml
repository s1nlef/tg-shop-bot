services:
  bot:
    build:
      context: .
      network: host
    env_file: .env
    network_mode: host
    depends_on:
      db:
        condition: service_healthy 
  db:
    image: postgres:16
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: "tg_shop"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "passwordbd$2"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
volumes:
  postgres_data:
