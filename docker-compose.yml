services:
  bot:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy 
  db:
    image: postgres:16
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: "tg_shop"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "passwordbd$2"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5
volumes:
  postgres_data: